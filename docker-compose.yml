name: nftm

# Root .env is auto-loaded by docker compose (it sits next to this file).

networks:
  default:
    name: nftm_net

volumes:
  postgres_data:
  redis_data:

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Datastores — internal-only
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  # One-shot DB migrator — runs to completion before api/indexer start
  # ──────────────────────────────────────────────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INITIAL_SUPER_ADMIN_ADDRESS: ${INITIAL_SUPER_ADMIN_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────────
  # API (internal-only)
  # ──────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      DAPP_PUBLIC_ORIGIN: ${DAPP_PUBLIC_ORIGIN}
      ADMIN_PUBLIC_ORIGIN: ${ADMIN_PUBLIC_ORIGIN}
      CHAIN_ID: ${CHAIN_ID}
      BASE_RPC_URL: ${BASE_RPC_URL}
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
      ANVIL_RPC_URL: ${ANVIL_RPC_URL}
      USDC_ADDRESS: ${USDC_ADDRESS}
      FACTORY_ADDRESS: ${FACTORY_ADDRESS}
      MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
      VOUCHER_SIGNER_PRIVATE_KEY: ${VOUCHER_SIGNER_PRIVATE_KEY}
      PINATA_JWT: ${PINATA_JWT}
      PINATA_GATEWAY_URL: ${PINATA_GATEWAY_URL}
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Indexer (internal-only)
  # ──────────────────────────────────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CHAIN_ID: ${CHAIN_ID}
      BASE_RPC_URL: ${BASE_RPC_URL}
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
      ANVIL_RPC_URL: ${ANVIL_RPC_URL}
      FACTORY_ADDRESS: ${FACTORY_ADDRESS}
      MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
      PINATA_JWT: ${PINATA_JWT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # DApp — exposed only to localhost; VPS nginx terminates TLS and proxies in
  # ──────────────────────────────────────────────────────────────────────────
  dapp:
    build:
      context: .
      dockerfile: apps/dapp/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      ORIGIN: ${DAPP_PUBLIC_ORIGIN}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      TRUST_PROXY: ${TRUST_PROXY}
      PUBLIC_CHAIN_ID: ${CHAIN_ID}
      PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
      PUBLIC_MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
      PUBLIC_PINATA_GATEWAY_URL: ${PINATA_GATEWAY_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:9301:3000"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      ORIGIN: ${ADMIN_PUBLIC_ORIGIN}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      TRUST_PROXY: ${TRUST_PROXY}
      PUBLIC_CHAIN_ID: ${CHAIN_ID}
      PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
      PUBLIC_FACTORY_ADDRESS: ${FACTORY_ADDRESS}
      PUBLIC_MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
      PUBLIC_PINATA_GATEWAY_URL: ${PINATA_GATEWAY_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:9302:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Local dev only — start with `docker compose --profile dev up`
  # ──────────────────────────────────────────────────────────────────────────
  anvil:
    profiles: ["dev"]
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil --host 0.0.0.0 --chain-id 31337 --block-time 2"]
    ports:
      - "127.0.0.1:8545:8545"
